<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact JKD | Creative Digital Agency</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="description" content="Contact JKD Digital Studio for SEO, Branding, and Web Solutions.">

    <link href="img/favicon.ico" rel="icon">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #00f2ff;
            --dark: #060918;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            overflow-x: hidden;
            cursor: none;
        }

        /* --- MAGIC CURSOR --- */
        #magic-cursor {
            position: fixed; width: 30px; height: 30px;
            border: 2px solid var(--accent); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            transition: transform 0.1s ease-out;
        }
        #cursor-dot {
            position: fixed; width: 8px; height: 8px;
            background: #fff; border-radius: 50%;
            z-index: 10000; pointer-events: none;
        }

        /* --- UI ELEMENTS --- */
        .navbar {
            backdrop-filter: blur(20px);
            background: rgba(6, 9, 24, 0.85);
            border-bottom: 1px solid var(--border);
        }

        .hero-header {
            padding: 150px 0 80px;
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
        }

        .contact-form-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 40px;
            transition: 0.4s;
        }

        .contact-form-container:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.05);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 12px;
            padding: 15px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            color: #fff;
            box-shadow: none;
        }

        .contact-info-item {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .contact-info-item:hover {
            transform: translateX(10px);
            border-color: var(--primary);
        }

        .icon-box {
            width: 50px; height: 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px;
        }

        .btn-mass {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none; color: white; padding: 15px 40px;
            border-radius: 50px; font-weight: 700; transition: 0.3s;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            width: 100%;
        }

        .btn-mass:hover { transform: scale(1.02); color: #fff; box-shadow: 0 0 25px var(--accent); }

        .nav-link { color: #fff !important; }
        .nav-link.active, .nav-link:hover { color: var(--accent) !important; }
    </style>
</head>

<body>
    <div id="magic-cursor"></div>
    <div id="cursor-dot"></div>

    <nav class="navbar navbar-expand-lg navbar-dark px-4 px-lg-5 py-3 sticky-top">
        <a href="index.html" class="navbar-brand p-0">
            <h1 class="m-0 fw-bold" style="background: linear-gradient(to right, #fff, #00f2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">JKD</h1>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="fa fa-bars"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav mx-auto py-0">
                <a href="index.html" class="nav-item nav-link">Home</a>
                <a href="about.html" class="nav-item nav-link">About</a>
                <a href="service.html" class="nav-item nav-link">Service</a>
                <a href="project.html" class="nav-item nav-link">Project</a>
                <a href="contact.html" class="nav-item nav-link active">Contact</a>
            </div>
            <a href="contact.html" class="btn btn-mass d-none d-lg-block" style="width: auto;">Get Started</a>
        </div>
    </nav>

    <div class="container-xxl hero-header text-center" data-aos="fade-down">
        <h1 class="display-4 fw-bold text-white">Let's Connect</h1>
        <p class="lead opacity-75">Ready to start your digital transformation?</p>
    </div>

    <div class="container-xxl py-5">
        <div class="container px-lg-5">
            <div class="row g-5">
                <div class="col-lg-5" data-aos="fade-right">
                    <p class="text-accent fw-bold text-uppercase">Contact Us</p>
                    <h2 class="mb-4 fw-bold">Reach Out to JKD</h2>
                    
                    <div class="contact-info-item">
                        <div class="icon-box"><i class="fa fa-map-marker-alt text-white"></i></div>
                        <h5>Our Studio</h5>
                        <p class="mb-0 opacity-75">Madurai, Tamil Nadu, India</p>
                    </div>

                    <div class="contact-info-item">
                        <div class="icon-box"><i class="fa fa-envelope text-white"></i></div>
                        <h5>Email Us</h5>
                        <p class="mb-0 opacity-75">info@jkddigital.com</p>
                    </div>

                    <div class="contact-info-item">
                        <div class="icon-box"><i class="fa fa-phone-alt text-white"></i></div>
                        <h5>Call Us</h5>
                        <p class="mb-0 opacity-75">+91 98765 43210</p>
                    </div>
                </div>

                <div class="col-lg-7" data-aos="fade-left">
                    <div class="contact-form-container">
                        <form id="contactForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="name" placeholder="Name">
                                        <label for="name" class="text-white-50">Your Name</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="email" class="form-control" id="email" placeholder="Email">
                                        <label for="email" class="text-white-50">Your Email</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="subject" placeholder="Subject">
                                        <label for="subject" class="text-white-50">Subject</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating">
                                        <textarea class="form-control" placeholder="Message" id="message" style="height: 150px"></textarea>
                                        <label for="message" class="text-white-50">How can we help?</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-mass py-3" type="submit">Send Message Now</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid bg-dark text-light border-top border-secondary pt-5 mt-5">
        <div class="container py-4 text-center">
            <p>© JKD Digital Studio. Designed with ❤️ by Jeyasurya & Mohan</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        AOS.init({ duration: 1000, once: true });

        // Custom Cursor
        const cursor = document.getElementById('magic-cursor');
        const dot = document.getElementById('cursor-dot');
        window.addEventListener('mousemove', (e) => {
            gsap.to(dot, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(cursor, { x: e.clientX - 15, y: e.clientY - 15, duration: 0.2 });
        });

        // Magnetic Effect
        document.querySelectorAll('.btn-mass, .contact-info-item').forEach(el => {
            el.addEventListener('mousemove', (e) => {
                const rect = el.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                gsap.to(el, { x: x * 0.1, y: y * 0.1, duration: 0.3 });
            });
            el.addEventListener('mouseleave', () => {
                gsap.to(el, { x: 0, y: 0, duration: 0.5 });
            });
        });
    </script>
</body>
</html>
